---
name: "Shellcheck"

on:
  push:
    branches: [master, release]
    paths: ["**/*.sh"]
  pull_request:
    paths: ["**/*.sh"]
  workflow_dispatch:

jobs:
  shellcheck:
    name: "Run shellcheck"
    runs-on: ubuntu-latest

    steps:
      - name: "checkout repository"
        uses: actions/checkout@v6

      - name: "Run shellcheck"
        uses: ludeeus/action-shellcheck@master
