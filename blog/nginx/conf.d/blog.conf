# 定义 PHP-FPM FastCGI 上游, 使用 Unix Socket 可减少 TCP 栈开销, 容器或跨主机部署时可改为 php:9000
# keepalive 需配合 `fastcgi_keep_conn on;` 才能复用连接, 该值表示每个 Nginx worker 保留的空闲上游连接数
# 空闲连接上限约为 `worker_processes × keepalive`, 如: 2 核 2G 且 `worker_processes auto` 时约为 2 × 16 = 32 条
upstream php_backend {
    # server php:9000;
    server unix:/run/php/php-fpm.sock;
    keepalive 16; # 空闲连接池大小
}

server {
    listen       80;
    listen       [::]:80;
    server_name  blog.honeok.com;
    return 301   https://$host$request_uri;
}

server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    listen       443 quic;
    listen       [::]:443 quic;
    server_name  blog.honeok.com;

    ssl_certificate      /etc/nginx/certs/honeok.com_fullchain.pem;
    ssl_certificate_key  /etc/nginx/certs/honeok.com_key.pem;

    add_header Alt-Svc 'h3=":443"; ma=86400,h3-29=":443"; ma=86400';

    # more_set_headers 'X-Client-IP: $remote_addr';
    # more_set_headers 'X-Request-Id: $request_id';
    # more_set_headers 'X-Request-Time: $request_time';

    # 阻止访问敏感文件
    access_by_lua_file /etc/nginx/lua/block.lua;

    # wordpress主站点路径及路由
    location / {
        root   /usr/local/openresty/nginx/html/wordpress;
        index  index.php;
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        root   /var/www/html/wordpress;
        index  index.php;

        fastcgi_pass php_backend;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_cache fastcgi;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|bmp|swf|eot|svg|ttf|woff|woff2|webp)$ {
        root  /usr/local/openresty/nginx/html/wordpress;
        aio  threads;
        access_log  off;
        log_not_found  off;
        try_files  $uri =404;
        add_header  Cache-Control "public, max-age=2592000";
    }

    location = /robots.txt {
        root  /usr/local/openresty/nginx/html/wordpress;
        allow  all;
        access_log  off;
        log_not_found  off;
        try_files  $uri =404;
    }

    error_page 403 /403.html;
    location = /403.html {
        root  /usr/local/openresty/nginx/html;
        internal;
    }

    error_page 404 /404.html;
    location = /404.html {
        root  /usr/local/openresty/nginx/html;
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root  /usr/local/openresty/nginx/html;
        internal;
    }
}
