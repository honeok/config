# /usr/local/openresty/nginx/conf/nginx.conf

load_module modules/ngx_http_acme_module.so;
load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;
load_module modules/ngx_http_geoip2_module.so;
load_module modules/ngx_stream_geoip2_module.so;
load_module modules/ngx_http_zstd_filter_module.so;
load_module modules/ngx_http_zstd_static_module.so;

user  nginx;
worker_processes  auto; # 设置工作进程数量，通常为CPU核心数

pcre_jit on; # 允许使用JIT来加速正则表达式的处理

# 设置原则: 需与worker_connections配合，通常设置为worker_connections的两倍（反向代理场景下，每连接可能需要两个文件描述符：一个用于客户端，一个用于上游服务器）
worker_rlimit_nofile  65535; # 指定每个工作进程可打开的最大文件描述符数量

# 启动一个默认线程池，将阻塞任务（如磁盘 I/O）交给线程池，释放主线程处理更多请求
# 需启用 aio on;
# threads：线程数，建议设为CPU核心数的2-4倍
# max_queue: 任务队列上限，防止任务堆积
thread_pool  default threads=16 max_queue=65536; # 分配16个线程来处理请求，并且这个线程池的队列最大长度为65536。可以处理更多的并发请求，减少请求等待时间提高系统的吞吐量

# 使用eBPF启用QUIC数据包路由，启用后可支持QUIC连接迁移
# 该指令仅支持Linux 5.7+
# quic_bpf  on;

error_log  /usr/local/openresty/nginx/logs/error.log error;
pid        /run/nginx.pid;

events {
    use  epoll; # 使用epoll作为事件模型，默认使用epoll作为事件驱动模型，无需显式配置use epoll即可生效

    # 启用后工作进程一次处理多个新连接，提升高并发性能，适用高并发场景
    multi_accept  on; # 控制工作进程是否一次性接受队列中所有新连接

    # 设置每个工作进程可处理的最大并发连接数 默认值512
    # 根据内存和worker_rlimit_nofile调整，常见1024-65536
    # 最大并发连接数 = worker_processes * worker_connections
    worker_connections  2048;
}

http {
    include       /usr/local/openresty/nginx/conf/mime.types;
    default_type  application/octet-stream;
    charset       utf-8; # 响应内容的字符编码

    lua_package_path "/etc/nginx/lua/?.lua;/usr/local/openresty/lualib/?.lua;;"; # Lua 模块
    lua_package_cpath "/usr/local/openresty/lualib/?.so;;"; # C 模块

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # buffer=512k 设置512KB内存缓冲区，减少磁盘I/O
    # 缓冲数据每10秒写入磁盘，平衡性能与数据安全
    access_log  /usr/local/openresty/nginx/logs/access.log main buffer=512k flush=10s; # 把访问日志使用main格式缓存在内存中

    ## https://nginx.org/en/docs/http/ngx_http_core_module.html
    # 启用异步文件 I/O, 默认值 off, 主要用于本地大文件下载、视频、镜像站, 普通网站/API/反代通常不需要
    # aio on 需配合 directio 且会绕过页缓存, 现代 Linux 大文件场景更建议局部使用 aio threads, 但需编译 --with-threads
    aio off;

    # 是否将 AIO 用于写入代理临时文件, 默认 off, 仅在 aio threads 下生效
    # 用于上游响应很大或客户端很慢、Nginx 需要把响应暂存到磁盘的场景, 普通站点一般关闭
    aio_write  off;

    # 延迟未授权请求的 401 响应, 默认 0s; 用于 auth_basic、auth_request 子请求、JWT 等鉴权场景, 降低基于响应时间猜测账号/密码/token 的风险
    # 这不是限速/防爆破模块, 普通站点可保持默认; 登录、后台、API 鉴权入口可按需设 1s 左右
    auth_delay  0s;

    chunked_transfer_encoding  on; # 允许禁用 HTTP/1.1 中的分块传输编码, 默认 on

    # https://blog.cloudflare.com/delivering-http-2-upload-speed-improvements
    # 读取客户端请求体的缓冲区大小, 默认 8k/16k, 超出后会写入临时文件, 常见于 POST、表单、小文件上传
    # 适当调大可减少小/中等请求体落盘, 并改善 HTTP/2 上传缓冲偏小的问题, 高并发大上传场景需注意内存占用
    client_body_buffer_size 256k;

    # https://www.plesk.com/blog/various/nginx-performance-tuning-tips
    # 用于设置客户端请求体相邻读操作的空闲超时时间, 默认 60s, 不是整个请求体上传总耗时
    # 通用配置建议 30s, 兼顾弱网上传和慢速连接释放, 无上传场景可收紧, 上传/导入接口可单独放宽
    client_body_timeout  30s;

    # 用于设置读取客户端请求头的基础缓冲区大小, 默认 1k
    # 该参数不是请求体缓冲区, 主要影响请求行和请求头字段的初始读取缓冲
    # 通用站点可设为 4k, 兼容较长 Cookie、CDN 头、鉴权头, 最终头部上限仍由 `large_client_header_buffers` 控制
    client_header_buffer_size  4k;

    # 用于设置客户端完整请求头的读取超时时间, 默认 60s, 超时未收完整 header 时返回 408 Request Timeout
    # 通用配置建议 30s, 兼顾弱网、CDN/代理链路和慢速连接释放, 高防/纯静态站可按需收紧到 15s
    client_header_timeout  30s;

    # 用于限制客户端请求体的最大允许大小, 默认 1m, 超出限制时返回 413 Request Entity Too Large
    # 该参数作用于 POST/PUT、表单提交、文件上传和 API 请求体, 不是响应体限制, 0 表示关闭大小检查
    # 通用配置可设为 64m, 大文件上传、WebDAV、备份导入等场景应在具体 server/location 单独放宽
    client_max_body_size  64m;

    # 用于对达到指定大小的本地文件启用 Direct I/O, 默认 off, 读取时绕过系统页缓存, 并自动禁用该请求的 sendfile
    # 主要用于大体积文件下载、视频、镜像包等场景, 避免大文件挤占页缓存; 普通 html/css/js/图片建议保持 off
    # Linux 下配合传统 aio on 时通常需要 directio, 现代场景更建议只在大文件 location 中按需设置
    directio  off;

    # 用于设置 directio 的文件读取对齐大小, 默认 512, 仅在启用 directio 时才有意义
    # 大多数文件系统保持 512 即可, Linux 下使用 XFS 且启用 directio 时通常需要改为 4k
    directio_alignment  512;

    # 用于控制打开静态文件时是否检查路径中的符号链接, 默认 off, on 会拒绝任何符号链接, if_not_owner 仅拒绝链接与目标文件属主不同的情况
    # 该检查会增加文件访问开销, 且 autoindex/random_index/dav 模块会忽略此参数, 通用配置保持 off, 多用户站点可按需启用 if_not_owner from=$document_root
    disable_symlinks  off;

    # 用于为静态资源自动生成 ETag 响应头, 默认 on, 可与 Last-Modified 配合进行缓存校验, 命中时返回 304 以减少传输
    # 仅影响 nginx 直接服务的静态文件, 不控制上游应用返回的 ETag, 多节点环境需确保文件内容和修改时间一致, 否则缓存校验可能不稳定
    # 通用配置建议保持 on, 如果完全依赖文件名指纹、强 Cache-Control 或 CDN 缓存策略, 可按需关闭
    etag  on;

    # 用于控制是否忽略名称非法的请求头字段, 默认 on, 合法字段名通常由字母、数字、连字符组成, 下划线由 underscores_in_headers 控制
    # 通用配置建议保持 on, 可丢弃异常/非标准头部并减少兼容风险, 仅在明确需要接收特殊头字段时再考虑关闭
    ignore_invalid_headers  on;

    keepalive_disable  msie6; # 用于对特定异常浏览器禁用 HTTP keep-alive, 默认 msie6, 主要是兼容旧版 IE 在 POST 后的连接复用问题

    # 用于设置 keep-alive 客户端连接的最小保留时间, 默认 0; nginx 1.27.4+ 支持, 主要影响连接复用和 worker 优雅退出期间的连接关闭策略
    # 通用配置建议保持 0, 如频繁 reload 且希望减少空闲 keep-alive 连接被过早关闭, 可按需设为 5s~10s, 但会延长旧 worker 退出时间
    keepalive_min_timeout 0;

    # 设置可通过单个保持连接处理的最大请求数, 达到最大请求数后, 连接将被关闭
    # 定期关闭连接对于释放每个连接占用的内存至关重要, 因此设置过高的最大请求数可能会导致内存使用过量, 不建议这样做
    # 在 1.19.10 版本之前, 默认值为 100
    keepalive_requests  1000;

    # 用于限制单个 keep-alive 连接的最长存活时间, 默认 1h, 到达时间后不会中断当前请求, 而是在后续请求处理完成后关闭连接
    # 该参数不是空闲超时, 空闲连接释放由 keepalive_timeout 控制, 通用配置保持 1h, 高并发短连接入口可按需收紧到 15m~30m
    keepalive_time  1h;

    # 用于设置客户端 keep-alive 空闲连接在服务端保留的时间, 默认 75s, 0 表示禁用客户端连接复用
    # 时间越长越利于连接复用和减少 TCP/TLS 重建, 但会增加空闲连接占用, 通用配置保持 75s, 连接压力不高可放宽到 120s
    keepalive_timeout  75s;

    # 用于读取超出 `client_header_buffer_size` 的大请求头, 默认 4 8k, 缓冲区按需分配请求结束进入 keep-alive 后释放
    # 请求行不能超过单个 buffer 否则返回 414, 单个请求头字段不能超过单个 buffer, 否则返回 400
    # 通用配置建议保持 4 8k, 如存在长 Cookie、SSO回调、JWT、企业后台这类场景兜底等场景, 可在对应 server 调整为 4 16k 8 16k 等更大的值
    large_client_header_buffers  4 8k;

    # 用于限制单个请求向客户端发送响应的速率, 默认 0 表示不限速， 单位为字节/秒, 多连接并发时总速率会叠加
    # 通用配置建议保持 0， 下载站、镜像站、防刷流量等场景可在具体 location 中按需限速
    # 反代上游也可通过 `X-Accel-Limit-Rate` 响应头动态限速, 不需要时可用 proxy_ignore_headers 禁用
    limit_rate  0;

    # 用于设置响应开始限速前允许先发送的数据量, 默认 0 需配合 limit_rate 使用, 0 表示从响应一开始就按限速发送
    # 适合下载/视频/镜像等场景先放行文件开头、再限制后续传输速率, 通用配置不启用限速时保持 0
    limit_rate_after  0;

    # 用于控制 nginx 关闭客户端连接前是否继续读取剩余数据, 默认 on; 可避免请求体未读完就直接关连接导致协议异常
    # off 会立即关闭连接且可能破坏协议, always 会无条件等待更多数据, 通用配置保持 on, HTTP/2 场景需在 server 级别配置才生效
    lingering_close  on;

    # 用于限制 lingering_close 生效时读取并丢弃客户端剩余数据的最长时间, 默认 30s
    # 超过该时间后即使客户端仍在发送数据也会关闭连接, 通用配置保持默认, 通常需与 lingering_close on 配合使用
    lingering_time  30s;

    # 用于设置 lingering_close 生效时等待客户端继续发送剩余数据的单次等待时间, 默认 5s
    # 若超时无数据则关闭连接; 若收到数据则读取并丢弃后继续等待, 总处理时长受 lingering_time 限制
    lingering_timeout  5s;

    # 用于控制静态文件未找到时是否记录到 error_log, 默认 on, 主要影响本地文件 404 的错误日志输出
    # 通用配置建议保持 on 便于排查路径和资源缺失, 对 favicon、robots、探测路径等高频无效请求可在具体 location 关闭
    log_not_found  on;

    # 用于控制是否将 nginx 子请求写入 access_log, 默认 off, 常见于 auth_request、SSI、mirror、部分 Lua/internal 子请求等场景
    # 通用配置建议保持 off, 避免访问日志被内部子请求放大, 调试鉴权、内部跳转或子请求链路时可临时开启
    log_subrequest  off;

    # 用于限制单个请求允许的请求头行数, 默认 1000, 达到限制时返回 400 Bad Request
    # 该参数可防止异常客户端发送大量 header 占用解析资源, nginx 1.29.8+ 支持, 通用配置保持默认即可
    # max_headers  1000;

    # 用于给旧版 MSIE 的 4xx/5xx 错误响应补足到 512 字节, 默认 on, 主要兼容 IE 自定义错误页机制
    # 现代站点通常不再需要该兼容逻辑, 关闭可避免无意义填充, 如仍需兼容老 IE 可保持默认
    msie_padding  off;

    # 用于对 MSIE 客户端使用 Refresh 头替代标准重定向, 默认 off, 属于旧浏览器兼容行为
    # 通用现代配置保持 off, 避免改变标准 301/302 跳转语义
    msie_refresh  off;

    # 用于缓存静态文件的打开文件描述符、大小/修改时间和目录存在性信息, 默认 off; 文件查找错误需由 open_file_cache_errors 单独控制
    # 可减少高频静态资源、try_files、镜像目录的 open/stat 系统调用, 文件频繁变更时需配合 open_file_cache_valid 控制刷新周期
    # 如果缓存满了会根据 LRU (最近最少使用) 原则淘汰旧的条目, 如果一个缓存条目在x秒内没有被访问, 则自动将其从缓存中移除
    open_file_cache max=2000 inactive=30s;

    open_file_cache_errors  on; # 缓存404 403这类错误信息，有效避免对一个不存在的文件（如网站根目录下缺失的favicon.ico）反复查询磁盘

    # 用于设置 open_file_cache inactive 周期内的最小访问次数, 默认 1, 达到次数的文件描述符才会继续保留在缓存中
    # 设为 2 可避免一次性访问文件长期占用缓存项, 更适合通用静态站/镜像站模板, 需配合 open_file_cache 使用
    open_file_cache_min_uses  2; # 入口过滤器，设置一个文件至少要被访问2次，它的文件句柄才会被缓存，确保缓存里都是热门资源

    # 用于设置 open_file_cache 缓存项的重新校验周期, 默认 60s, 到期后会重新检查文件描述符、大小、修改时间和存在性
    # 周期越长越减少 stat/open 检查开销, 但文件变更感知更慢, 通用静态站/镜像站保持 60s 较稳
    open_file_cache_valid  60s;

    # 用于设置从磁盘读取响应内容时使用的输出缓冲区, 默认 2 32k, 主要影响 nginx 直接读取本地静态文件的场景
    # 通用配置保持默认即可, 大文件下载、视频、镜像目录配合 aio/directio 时可在具体 location 适当调大
    output_buffers  2 32k;

    # 用于对超时连接和 return 444 关闭的连接发送 TCP RST, 默认 off, 可立即释放 socket 资源, 减少 FIN_WAIT1 长时间占用
    # 只影响已超时或被主动丢弃的异常连接, 不影响正常请求关闭, 通用公网服务可开启, 极端兼容场景可保持默认
    reset_timedout_connection  on;

    # 常用于 ACME、OCSP Stapling、变量 proxy_pass、动态 upstream resolve、Docker 容器服务名、njs/lua 外部请求等场景
    # valid=30s 表示覆盖 DNS 结果缓存时间为 30 秒; ipv6=off 表示不查询 AAAA 记录, 建议使用可信 DNS
    resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;
    # resolver 223.5.5.5 119.29.29.29 valid=30s ipv6=off;

    # 用于设置 DNS 解析超时时间, 默认 30s
    # 表示 nginx 向 resolver 发起 DNS 查询后最多等待多久, 超时则认为解析失败
    # 普通公网 DNS 可设为 5s~10s; 内网/Docker DNS 通常也不建议太长, 避免请求长时间卡在解析阶段
    resolver_timeout 5s;

    # 用于设置向客户端发送响应的相邻写操作超时时间, 默认 60s, 只限制两次发送数据之间的空闲时间, 不是完整响应传输总耗时
    # 默认值已适合通用网站/API/反代/下载场景, 过短可能误断慢速客户端, 高并发且需快速释放慢连接时再按需收紧
    send_timeout  60s;

    # 用于启用 sendfile() 发送本地静态文件, 默认 off, 可减少文件在内核态/用户态之间的拷贝, 提升静态资源与下载类响应效率
    # 主要影响 nginx 直接读取本地文件的场景, 不加速 proxy_pass 上游响应, 通用生产配置建议开启, 大文件 directio 场景会按请求自动禁用 sendfile
    sendfile  on;

    # 用于限制单次 sendfile() 调用最多发送的数据量, 默认 2m, 避免单个高速连接长时间占用 worker
    # 默认值已适合通用生产场景, 通常无需调整, 只有大文件高吞吐下载场景才建议结合并发与延迟测试
    sendfile_max_chunk  2m;

    # server_names_hash_bucket_size  64; # 设置服务器名称哈希表中每个"桶" (Bucket) 的大小, 默认值取决于处理器缓存行的大小

    # 用于设置 server_name 哈希表的最大容量, 默认 512, 影响大量虚拟主机/多域名匹配表的构建空间
    # 通用配置保持默认即可, 当 server_name 数量较多或启动提示 server_names_hash 空间不足时再启用
    # 常见可先调到 1024, 仍报错再继续增大, 必要时配合 server_names_hash_bucket_size 调整
    server_names_hash_max_size  512; # 用于设置存放服务器名称 (server_name) 哈希表的最大尺寸, 默认值512

    server_tokens  off; # 启用或禁用在错误页面和 "Server" 响应标头字段中显示 nginx 版本

    ## https://github.com/openresty/headers-more-nginx-module
    more_clear_headers 'Server' 'X-Powered-By' 'X-AspNet-Version' 'X-AspNetMvc-Version' 'X-Generator';
    # more_set_headers 'Server: honeok'; # 自定义Server响应头

    # 用于设置子请求响应体保存在内存时的缓冲区大小, 默认 4k/8k, 取决于系统内存页大小
    # 仅影响 SSI 等会缓存子请求响应体的场景, 通用配置保持默认即可, 子请求响应片段较大时可按需调到 16k
    subrequest_output_buffer_size  8k;

    # 用于启用 TCP_NODELAY, 默认 on, 连接进入 keep-alive 后会禁用 Nagle 延迟, SSL、WebSocket、非缓冲代理场景也会自动启用
    # 可降低小响应、动态接口、长连接交互的发送延迟, 通用配置保持默认开启即可, 通常不建议关闭
    tcp_nodelay  on;

    # 用于在 sendfile 发送本地静态文件时启用 TCP_NOPUSH/TCP_CORK, 默认 off, 可让响应头与文件开头尽量合并发送, 并按完整包输出文件数据
    # 仅在 sendfile on 时有意义, 主要优化静态资源和下载类响应的发包效率, 通用生产配置可配合 sendfile 开启
    tcp_nopush  on;

    # 用于设置 MIME types 哈希表的 bucket 大小, 默认 64, 影响 types 映射表的构建, 不是响应缓冲区
    # 通用配置保持默认即可, 仅在自定义 types 很多或启动提示 types_hash 相关空间不足时再按提示调大
    # 与CPU缓存行大小对齐 getconf LEVEL1_DCACHE_LINESIZE
    types_hash_bucket_size  64;

    # 用于设置 MIME types 哈希表的最大容量, 默认 1024, 影响扩展名到 Content-Type 映射表的构建空间
    # 通用配置保持默认即可, 仅在自定义 types 很多或启动提示 types_hash 空间不足时再按提示调大, 常见可先试 2048
    types_hash_max_size  1024;

    # 用于控制是否允许客户端请求头字段名包含下划线, 默认 off, 关闭时含下划线的头会被标记为非法, 并受 ignore_invalid_headers 控制
    # 通用配置建议保持 off, 更符合 HTTP 头字段常规写法, 仅在后端明确需要 X_Custom_Header、X_Real_IP 等非标准头名时再开启
    underscores_in_headers  off;

    # 用于设置 nginx 变量哈希表的 bucket 大小, 默认 64, 影响内置变量和模块变量名的哈希表构建
    # 通用配置保持默认即可, 仅在变量数量很多或启动提示 variables_hash 相关空间不足时再按提示调大
    variables_hash_bucket_size  64;

    # 用于设置 nginx 变量哈希表的最大容量, 默认 1024, 影响内置变量、模块变量和自定义变量的哈希表构建空间
    # 通用配置保持默认即可, 仅在变量数量很多, 或启动提示 variables_hash 空间不足时再按提示调大
    variables_hash_max_size  1024;

    # ## https://github.com/tokers/zstd-nginx-module
    # zstd  on; # 启用或禁用响应的 zstd 压缩，默认 off
    # zstd_comp_level  3; # 设置响应的 ZSTD 压缩级别, 可接受的值范围为 范围1 (快) 到 22 (高压缩) 建议3~5, 平衡压缩速度与比率适合高流量场景, 等级越高压缩率越好但 CPU 开销越大
    # zstd_min_length  1k; # 设置启用 zstd 压缩的最小响应大小, 默认 20, 太小的响应压缩收益低且浪费 CPU
    # zstd_buffers  32 4k; # 设置 zstd 压缩缓冲区数量和大小, 默认 32 4k
    # zstd_static  on; # 启用预压缩 .zst 静态文件发送, 客户端支持 zstd 且存在同名 .zst 文件时直接返回该文件, 默认 off
    # zstd_types
    #     text/plain text/css text/javascript text/xml
    #     application/javascript application/json application/xml
    #     application/rss+xml application/atom+xml
    #     application/vnd.api+json application/xhtml+xml application/wasm
    #     image/svg+xml;

    # ## https://github.com/google/ngx_brotli
    # # https://gablaxian.com/blog/brotli-compression
    # brotli_static  on; # 启用预压缩 .br 静态文件发送, 默认 off
    # brotli  on; # 启用或禁用响应的即时压缩，默认 off
    # brotli_comp_level  6; # 设置 Brotli 动态压缩等级, 可接受的值范围为 0 ~ 11, 数值越高压缩率越好但 CPU 开销越大
    # brotli_window  512k; # 设置了Brotli压缩算法的 "滑动窗口" 大小, 可接受的值为 1k、2k、4k、8k、16k、32k、64k、128k、256k、512k、1m、2m、4m、8m 和 16m
    # brotli_min_length  1k; # 设置启用 Brotli 压缩的最小响应大小, 其长度仅由 "Content-Length" 响应头字段决定, 默认值为 20
    # brotli_types
    #     text/plain text/css text/javascript text/xml
    #     application/javascript application/json application/xml
    #     application/rss+xml application/atom+xml
    #     application/vnd.api+json application/xhtml+xml application/wasm
    #     image/svg+xml;

    ## https://nginx.org/en/docs/http/ngx_http_gzip_module.html
    gzip  on; # 开启Gzip压缩, 减小传输内容大小提高页面加载速度

    # https://en.angie.software/angie/docs/configuration/modules/http/http_gzip_static
    # 用于启用预压缩 .gz 静态文件发送, 默认 off
    # 开启后如果磁盘上存在同名 .gz 文件, 且客户端支持 gzip, nginx 会直接发送 .gz 文件, 避免运行时动态压缩, 降低 CPU 开销
    # 适合前端构建产物、静态站、文档站、镜像站目录页等可提前压缩的静态资源
    # on 表示仅在客户端支持 gzip 时才发送 .gz, always 表示不检查客户端是否支持 gzip, 强制使用 .gz 文件
    # 普通生产环境建议使用 on, 不建议使用 always, 除非磁盘上只有 .gz 文件或配合 gunzip 模块给不支持 gzip 的客户端解压
    # 原始文件和 .gz 文件建议保持相同修改时间, 避免 Last-Modified/缓存校验行为不一致
    gzip_static  on;

    gzip_buffers  32 4k; # 设置用于Gzip压缩的缓冲区数量和大小 getconf PAGE_SIZE 获取默认值 32 4k总共128KB
    gzip_comp_level  4; # 设置响应的 gzip 压缩级别 (范围为1-9, 越高压缩率越高但占用CPU更多)
    gzip_disable  "MSIE [1-6]\.|Netscape/4"; # 历史遗留的产物, 禁用对早期 IE 浏览器和 Netscape 4 浏览器的 Gzip 压缩
    gzip_http_version  1.1; # 设置压缩响应所需的最低 HTTP 请求版本

    # 设置将被压缩的响应的最小长度, 该长度仅由响应头中的 "Content-Length" 字段确定, 默认 20
    # 该大小只根据响应头中的 Content-Length 判断; 如果响应没有 Content-Length, 可能不会按该值判断
    # 太小的响应压缩收益很低, 反而会增加 CPU 开销和 gzip 头部开销
    # 普通网站/API/反代建议设置为 1k 或 2k, 只压缩有明显收益的文本响应
    gzip_min_length  1k;

    # 根据请求和响应, 启用或禁用代理请求响应的 gzip 压缩, 请求是否为代理请求由请求头中是否存在 "Via" 字段决定, 该指令接受多个参数, 默认值为 off
    # 这里的代理请求是指客户端请求经过 CDN/代理/网关并带有 Via 头, 不是单纯指 nginx proxy_pass 到上游
    # off 表示禁用所有代理请求压缩, any 表示对所有带 Via 的代理请求启用压缩
    # expired/no-cache/no-store/private/auth 表示当响应不可缓存、私有, 或请求带 Authorization 时允许 gzip, 属于较保守的传统写法
    # 如果存在包含敏感 token、隐私数据的动态页面, 需注意压缩侧信道风险, 不建议无脑使用 any
    gzip_proxied  expired no-cache no-store private auth;

    gzip_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json application/xml
        application/rss+xml application/atom+xml
        application/vnd.api+json application/xhtml+xml application/wasm
        image/svg+xml;

    # 用于在启用 gzip/gzip_static/gunzip 时添加 Vary: Accept-Encoding 响应头, 默认 off
    # 该响应头告诉浏览器、CDN、代理缓存: 同一 URL 会根据客户端 Accept-Encoding 返回压缩或未压缩版本
    # 开启后下游缓存应按 Accept-Encoding 区分缓存键, 避免把 gzip 版本错误返回给不支持 gzip 的客户端
    # 普通网站/API/反代/CDN 场景建议开启
    gzip_vary  on; # 添加 Vary: Accept-Encoding, 让 CDN/代理按压缩能力区分缓存版本, 避免压缩/未压缩响应混用

    ## https://nginx.org/en/docs/http/ngx_http_v3_module.html
    http3  on;

    # 用于启用 QUIC 互操作性测试中的 HTTP/0.9 协议协商, 默认 off
    # 该参数主要用于 HTTP/3/QUIC interop 测试或调试场景, 不是正常网站提供 HTTP/3 所必需
    # 普通生产环境、反代、网站、API、下载站都不应开启, 保持 off 即可
    http3_hq  off;

    # 用于设置单个 HTTP/3/QUIC 连接内允许并发的最大请求 stream 数量, 默认 128
    # HTTP/3 基于 QUIC, 一个连接中可以同时承载多个请求/响应, 每个请求/响应对应一个 stream
    # 数值越大, 单连接可并发处理的请求越多, 有利于资源较多的页面或高并发复用连接, 数值过大可能导致单个连接占用更多内存、请求处理资源和上游连接资源
    # 数值过小可能限制浏览器并发加载资源, 影响 HTTP/3 多路复用效果
    # 普通网站/API/反代保持默认 128 通常足够; 如明确存在单连接 stream 并发瓶颈, 可测试 256
    http3_max_concurrent_streams  256; # 提高单个 HTTP/3/QUIC 连接内可并发处理的请求 stream 数量

    # http3_stream_buffer_size 用于设置 QUIC stream 读写缓冲区大小, 默认 64k
    # 该参数影响 HTTP/3 请求/响应在单个 QUIC stream 上读写数据时的缓冲能力
    # 数值过小可能在高带宽、高 RTT、大响应或大上传场景下增加读写调度开销, 影响吞吐
    # 数值过大则会增加每个活跃 QUIC stream 的内存占用, 高并发 HTTP/3 连接下需要注意内存压力
    # 普通网站/API/反代通常保持默认 64k 即可, 大文件下载、对象存储上传、WebDAV、测速等场景可测试 128k
    http3_stream_buffer_size  128k; # 放大 QUIC stream 读写缓冲区, 用于改善 HTTP/3 大上传/大响应吞吐, 需结合并发和内存测试

    # 用于设置 QUIC active_connection_id_limit 传输参数, 默认 2
    # 该参数表示服务端最多保存多少个客户端 Connection ID, 主要影响 QUIC 连接迁移和网络路径变化场景
    # Connection ID 可让 QUIC 在客户端 IP/端口变化时继续识别同一连接, 例如 Wi-Fi/蜂窝网络切换、NAT 端口变化等
    # 数值越大, 对移动端、弱网、频繁网络切换、多路径场景更宽松, 但每个 QUIC 连接需要维护更多状态
    # 普通网站/API/反代通常保持默认 2 即可, 移动端占比高或希望增强 QUIC 连接迁移能力时可测试 4/8
    quic_active_connection_id_limit  4; # 客户端允许服务器同时使用多少个connection ID，允许客户端在网络切换时（如 Wi-Fi → 5G）保持会话不中断

    quic_gso  on; # 启用分段卸载功能，以优化的批量模式发送数据, 优化发送仅在支持 UDP_SEGMENT 的 Linux 系统上受支持
    quic_retry  on; # 启用 QUIC 地址验证, 防止伪造攻击，启用后服务器对新连接发起"Retry"包，验证客户端地址真实性

    ## https://nginx.org/en/docs/http/ngx_http_v2_module.html
    # https://blog.cloudflare.com/delivering-http-2-upload-speed-improvements
    http2  on;

    # 用于设置 HTTP/2 每个请求的请求体预读缓冲区大小, 默认 64k
    # 该参数影响 HTTP/2 上传/POST/PUT 请求体, 不是响应体缓存, 也不是最大上传大小
    # 在 HTTP/2 中, 请求体接收受 stream flow control 流控窗口影响; 该值会影响请求处理前可预读的 body 数据量, 也会影响初始上传窗口
    # 如果该值过小, 高带宽、高 RTT、大文件上传场景下客户端可能频繁等待 WINDOW_UPDATE, 导致 HTTP/2 上传吞吐低于预期
    # 适当调大该值可改善对象存储上传、WebDAV、大文件 POST/PUT、测速上传等场景, 但高并发时会增加每请求内存占用
    # 普通网站/API/反代可保持默认 64k, 如存在 HTTP/2 上传吞吐瓶颈, 可结合 client_body_buffer_size 测试 128k/256k/512k
    # cloudflare 建议设置 TCP 接收缓冲区自动调优 net.ipv4.tcp_moderate_rcvbuf = 1
    http2_body_preread_size  128k; # 温和放大 HTTP/2 上传预读/流控窗口, 用于缓解大上传吞吐瓶颈, 需结合实际网络测试

    # 用于设置 HTTP/2 响应体切片的最大大小, 默认 8k
    # 该参数影响服务端向客户端发送响应 body 的切片大小, 不是请求体上传, 也不是最大响应大小
    # 值太小会把响应切得过碎, 增加 HTTP/2 frame、调度和发送处理开销
    # 值太大则单个大响应会占用更长的连续发送时间, 影响同一 HTTP/2 连接上其他 stream 的优先级调度, 可能加重 HOL blocking
    # 16k 相比默认 8k 更偏向大响应/下载吞吐, 适合镜像站、下载站、大静态资源场景测试使用
    http2_chunk_size  16k; # 将 HTTP/2 响应体切成更大的发送块, 减少切片/frame 处理开销, 适合大响应场景测试

    # 用于设置单个 HTTP/2 连接内允许并发的最大 stream 数量, 默认 128
    # HTTP/2 一个 TCP/TLS 连接中可以同时承载多个请求/响应, 每个请求/响应对应一个 stream
    # 数值越大, 单连接可并发处理的请求越多, 有利于资源较多的页面或高并发复用连接, 数值过大可能导致单个连接占用过多内存、请求处理资源和上游连接资源
    # 数值过小可能限制浏览器并发加载资源, 影响 HTTP/2 多路复用效果, 普通网站/API/反代通常保持默认 128 即可, 高资源页面或特殊客户端可测试 256
    http2_max_concurrent_streams  256;

    # 用于设置每个 worker 进程的 HTTP/2 输入接收缓冲区大小, 默认 256k
    # 该缓冲区用于接收和暂存客户端发送过来的 HTTP/2 帧数据, 包括 HEADERS、DATA 等帧
    # 它是 worker 级别的输入缓冲, 不是每个请求的上传缓冲, 也不是最大请求体大小
    # 数值过小可能在大量 HTTP/2 连接、gRPC 流式请求、大量 POST/PUT 上传等输入密集场景下增加读取和调度开销
    # 数值过大则会增加每个 worker 的内存占用, 普通 Web/API/反代场景通常没有必要调整
    # 绝大多数场景保持默认 256k 即可; 只有确认存在 HTTP/2 输入侧瓶颈时再测试增大
    http2_recv_buffer_size  256k; # 每个 worker 的 HTTP/2 输入缓冲区, 用于接收客户端发送的 HTTP/2 帧数据

    ## https://nginx.org/en/docs/http/ngx_http_acme_module.html
    # acme_issuer letsencrypt {
    #     uri  https://acme-v02.api.letsencrypt.org/directory;

    #     # challenge 用于指定 ACME 域名所有权验证方式, 可接受的值: http-01 (http) tls-alpn-01 (tls-alpn), 默认 http-01
    #     # http-01 通过 HTTP 80 端口验证, CA 会访问 http://域名/.well-known/acme-challenge/... 完成验证, 最常见也最稳
    #     # tls-alpn-01 通过 HTTPS 443 端口和特殊 ALPN 协议 acme-tls/1 验证, 适合不开放 80 端口、只走 443 的场景
    #     # ACME挑战具有版本控制, 如果指定了未版本化的名称, 模块会自动选择最新实现的版本
    #     # challenge http-01;

    #     contact  mailto:admin@example.com;

    #     # 启用或禁用 ACME 服务器证书验证, 默认 on
    #     ssl_verify on;

    #     # 定义一个用于存储模块数据的目录, 该目录的数据可以在重启后保留, 这可以通过跳过启动时的一些请求来缩短加载时间, 并避免达到 ACME 服务器的请求速率限制
    #     # 该目录包含 ACME 账户密钥、已签发证书和私钥等敏感内容, 应限制权限
    #     # 默认值: state_path acme_<issuer>;
    #     state_path  /var/cache/nginx/acme_letsencrypt;

    #     # 同意遵守ACME服务器的服务条款, 部分服务器要求在注册账户前接受服务条款, 这些条款通常可在ACME服务器的网站上找到, 如有必要相关网址将记录在错误日志中
    #     accept_terms_of_service;
    # }

    # 允许增加模块的内存存储空间, 共享内存区域将用于存储所有已配置证书颁发机构的已颁发证书、密钥和质询数据, 默认值 256k
    # 默认区域大小足以容纳大约 50 个 ECDSA prime256v1 密钥或 35 个 RSA 2048 密钥
    # acme_shared_zone zone=ngx_acme_shared:1M;

    ## https://nginx.org/en/docs/http/ngx_http_ssl_module.html
    # 用于设置 SSL/TLS 发送数据时的缓冲区大小, 默认情况下缓冲区大小为 16k
    # https://www.igvita.com/2013/12/16/optimizing-nginx-tls-time-to-first-byte
    # https://kubernetes.github.io/ingress-nginx/user-guide/nginx-configuration/configmap/#ssl-buffer-size Ingress-nginx 把 `ssl-buffer-size` 默认值设为 4k 用于优化 TLS 场景下的 TTFB
    # 16k 适合镜像站、下载站、视频、大图片、压缩包、静态资源、大响应体等场景, 目标是提高吞吐、减少 TLS 发送次数, 降低 CPU/网络开销
    # 4k 适合登录页、后台、API、动态页面、小 HTML、小 JSON 响应等场景, 目标是更早发送第一批数据, 降低 TTFB (Time To First Byte) 让页面起始响应更快
    ssl_buffer_size  8k;

    # 用于缓存通过变量动态加载的 SSL 证书和私钥, 例如 $ssl_server_name
    # 固定证书路径通常不需要开启, 保持默认 off 即可; 动态 SNI、多域名证书目录、多租户 HTTPS 场景建议开启
    # max=2000 最多缓存 2000 组证书/私钥对象, 超出后按 LRU 淘汰; inactive=5m 表示 5 分钟未访问则移出缓存, 默认值为 10 秒; valid=20m 表示 20 分钟后重新加载或校验, 默认值为 60 秒
    ssl_certificate_cache  max=2000 inactive=5m valid=20m;
    # ssl_certificate_cache  off;

    # 用于启用 TLS 1.3 服务器证书压缩, 该参数不是压缩网页内容, 而是压缩 TLS 握手阶段发送的服务器证书链, 可减少握手数据量
    # 需要 nginx 1.29.1+ 且 OpenSSL 3.2+; 使用 BoringSSL 时从 nginx 1.29.3 起支持 zlib 算法
    # 仅在 TLS 1.3 且客户端支持证书压缩扩展时生效; 对证书链较长、频繁新建连接、高延迟网络更有意义
    ssl_certificate_compression  on;

    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256;

    # 用于指定 ECDHE/TLS 椭圆曲线列表, 默认 auto
    # auto 表示使用 OpenSSL 内置推荐曲线列表, 现代 OpenSSL 通常会自动选择兼容性和性能较好的曲线, 如果手动指定多个曲线, 使用冒号分隔, 例如 prime256v1:secp384r1
    # 使用 ECDSA 证书时, 必须确保列表中包含证书使用的曲线, 否则可能导致证书不可用
    ssl_ecdh_curve  auto;

    # 用于控制是否优先使用服务端的 ssl_ciphers 顺序选择密码套件, 默认 off
    # 该参数主要影响 TLS 1.2 及以下的密码套件选择; 对 TLS 1.3 场景意义较小
    # on 表示由服务端按 ssl_ciphers 配置顺序优先选择, 适合明确维护强密码套件顺序的场景
    # off 表示更偏向客户端自己的密码套件偏好, 现代配置中通常也可以保持默认
    ssl_prefer_server_ciphers  on;

    ssl_protocols  TLSv1.2 TLSv1.3;  # 使用TLSv1.2、TLSv1.3协议
    ssl_session_cache  shared:SSL:10m; # 用于在服务器端创建一个缓存区域，专门用来存储已建立的SSL/TLS连接的会话信息，实现SSL/TLS会话复用，10m 大约可以存储40000个会话

    # 用于手动指定 TLS Session Ticket 加密/解密密钥
    # 只有多节点需要共享 ticket key 或有明确密钥轮换方案时才建议配置
    # 长期固定且不轮换的 ticket key 会增加安全风险, 因此单机或无跨节点复用需求时通常不建议手动指定
    # 若开启 ssl_session_tickets 且使用 nginx 1.23.2+ 的 shared ssl_session_cache, 可让 nginx 自动生成、存储并定期轮换 ticket key
    # openssl rand 80 > /etc/nginx/certs/tls-ticket-active.key  # 当前 key, 用于加密新 ticket
    # openssl rand 80 > /etc/nginx/certs/tls-ticket-drain.key   # 旧 key, 用于解密存量 ticket, 等待自然过期
    # chmod 600 /etc/nginx/certs/tls-ticket-*.key
    # ssl_session_ticket_key  /etc/nginx/certs/tls-ticket-active.key;
    # ssl_session_ticket_key  /etc/nginx/certs/tls-ticket-drain.key;

    # https://datatracker.ietf.org/doc/html/rfc5077
    # 用于启用或禁用 TLS Session Ticket 会话复用, 默认 on
    # on 表示客户端可通过 session ticket 恢复 TLS 会话, 减少后续连接的握手开销
    # off 表示禁用 ticket 方式的会话复用, 更保守, 可避免长期固定 ticket key 带来的安全风险
    # 风险主要来自手动配置长期不轮换的 ssl_session_ticket_key; 如无跨节点共享需求, 通常不建议手动指定 ticket key
    # 如果已使用 ssl_session_cache 且 nginx 版本较新, 可让 nginx 自动管理 ticket key
    ssl_session_tickets  on;

    # 用于设置客户端可复用 TLS 会话参数的时间, 即客户端可以在多长时间内回来"复用"这个会话, 默认 5m
    # 时间越长, 客户端越容易复用旧会话, 可减少重复 TLS 握手开销, 但会话复用窗口也更长
    # 普通 HTTPS 站点常见可设为 1h~1d, 安全更保守可保持较短时间
    ssl_session_timeout  1h;

    # https://letsencrypt.org/2024/12/05/ending-ocsp
    # 用于启用服务器证书的 OCSP Stapling (在线证书状态协议装订) 功能, 默认 off
    # Let’s Encrypt 已于 2025-08-06 关闭 OCSP 服务, 并改为通过 CRL 发布吊销信息
    # 因此使用 Let’s Encrypt 证书时通常建议保持 off, 避免无意义的 OCSP 查询或 nginx 警告
    # 如果使用其他仍提供 OCSP responder 的 CA, 且证书包含 OCSP URL, 可按需开启
    ssl_stapling  off;

    # 用于校验 nginx 获取到的 OCSP 响应, 确保服务器发送的证书状态可信, 默认 off
    # 仅在 ssl_stapling on 且正确配置 ssl_trusted_certificate 时才有意义
    ssl_stapling_verify  off;

    # 用于启用客户端证书校验, 默认 off
    # 该参数主要用于 mTLS / 双向 TLS / 客户端证书登录认证场景
    # on 表示必须提供并通过客户端证书校验; optional 表示有证书就校验, 没有也放行
    # optional_no_ca 表示请求客户端证书但不要求由可信 CA 签发, 通常用于后端服务自行校验证书
    # 普通 HTTPS 网站不校验客户端证书, 保持 off 即可
    ssl_verify_client  off;

    ## https://nginx.org/en/docs/http/ngx_http_headers_module.html
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always; # 启用HTTP严格传输安全HSTS头，强制浏览器仅通过HTTPS与服务器通信
    add_header X-Frame-Options "SAMEORIGIN" always; # 防止"点击劫持"(Clickjacking) 攻击，限制页面嵌套在同源框架中
    add_header X-Content-Type-Options "nosniff" always; # 禁止浏览器进行MIME类型嗅探，防止上传的恶意脚本被执行
    add_header Referrer-Policy "strict-origin-when-cross-origin" always; # 控制HTTPReferer头的内容,保护用户隐私避免泄露来源信息，no-referrer是一个最高级别的隐私，而牺牲大量分析功能和部分外部兼容性的决定
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), browsing-topics=()"; # 通过Permissions-Policy头限制特定的浏览器API，防止未经授权的访问
    # add_header Vary "Accept-Encoding" always; # 强制添加Vary头，告知缓存服务器根据Accept-Encoding进行内容变体存储

    # ## https://nginx.org/en/docs/http/ngx_http_limit_conn_module.html
    # # 用于定义连接数限制的共享内存区, 官方无默认值, 这里以客户端 IP 作为统计 key, 20m 用于保存连接计数状态
    # # 适合通用公网模板作为全局限连基础配置, 如位于 CDN/反代后方, 必须先配置 real_ip, 否则统计到的是 CDN/代理 IP
    # limit_conn_zone  $binary_remote_addr  zone=addr:20m;

    # # 用于限制单个客户端 IP 的并发请求数, 官方无默认值, 只统计已读完请求头且正在处理中的请求
    # # HTTP/2/HTTP/3 下每个并发请求都会单独计数, 通用配置可设 150, 避免过低误伤正常并发
    # limit_conn  addr  150;

    # # 用于启用 limit_conn dry-run 模式, 默认 off, on 时只记录和统计超限连接, 不实际拒绝请求
    # # 生产环境保持 off, 调整限连阈值前可临时开启 on 观察误伤情况
    # limit_conn_dry_run  off;
    # limit_conn_log_level  error; # 设置服务器限制连接数时所需的日志级别

    # # 用于设置 limit_conn 超过连接数限制时返回的状态码, 默认 503, 仅在触发 limit_conn 拒绝请求时生效
    # # 通用限连更建议 429, 语义上表示客户端请求过多, 便于和真实服务不可用的 503 区分
    # limit_conn_status  429;

    # ## https://nginx.org/en/docs/http/ngx_http_limit_req_module.html
    # # 用于定义请求速率限制的共享内存区, 官方无默认值, 官方示例常用 zone=one:10m, 这里以客户端 IP 作为统计 key
    # # rate=50r/s 表示单个 IP 平均每秒允许 50 个请求, 如位于 CDN/反代后方, 必须先配置 real_ip, 否则统计到的是 CDN/代理 IP
    # limit_req_zone  $binary_remote_addr  zone=one:50m  rate=50r/s;

    # # 用于限制单个客户端 IP 的请求处理速率, 官方无默认值, 限制的是请求频率, 不是并发连接数
    # # burst=150 允许短时间突发请求额度, nodelay 表示突发请求不延迟处理, 超出后按 limit_req_status 返回
    # limit_req  zone=one  burst=150  nodelay;

    # limit_req_dry_run  off;
    # limit_req_log_level  error;
    # limit_req_status  429;

    ## https://nginx.org/en/docs/http/ngx_http_fastcgi_module.html
    # https://cloud.tencent.com/developer/article/1683437
    # 用于设置读取 FastCGI 上游响应第一段数据的缓冲区大小, 默认 4k/8k, 通常等于系统内存页大小
    # 这部分通常包含响应头, 不是完整响应体缓存, 复杂 PHP 后台、登录态、多 Cookie 场景可适当放宽
    # 通过 `getconf PAGE_SIZE` 获取, 主流都为4096就等于4KB
    fastcgi_buffer_size  32k;

    # 用于控制是否缓冲 FastCGI 上游响应, 默认 on, 开启后 nginx 会尽快读取 PHP-FPM 响应并写入内存缓冲, 超出后可落盘到临时文件
    # 通用 LNMP/PHP/WordPress 建议保持 on, 可隔离慢客户端对 PHP-FPM 的占用, 实时输出、SSE、流式响应等场景可在具体 location 关闭
    # 上游也可通过 X-Accel-Buffering: yes/no 控制该行为, 如不希望上游覆盖可配合 fastcgi_ignore_headers 处理
    fastcgi_buffering  on;

    # 用于设置单个连接读取 FastCGI 上游响应体的缓冲区数量和大小, 默认 8 4k/8k, 缓冲区大小通常等于系统内存页
    # 通用模板可设为 8 16k, 比默认更能兼容中等 PHP/WordPress 动态响应, 又不会像 16 16k 那样明显放大并发内存占用
    fastcgi_buffers  8 16k;

    # 用于限制 FastCGI 响应未完全读完时, 已用于向客户端发送响应的 busy buffer 总大小, 默认约等于两个缓冲区大小
    # 通常应与 fastcgi_buffer_size/fastcgi_buffers 匹配; 使用 8 16k 缓冲时可设 32k, 普通通用模板无需再放大
    fastcgi_busy_buffers_size  32k;

    # 用于指定 FastCGI 响应缓存使用的共享内存区, 默认 off, 参数需引用 `fastcgi_cache_path` 中 keys_zone 定义的 zone 名
    # 同一个缓存区可在多个 server/location 复用, off 可取消上级继承的缓存配置, 用于后台、登录、API 等不应缓存的位置
    # fastcgi_cache  fastcgi;

    # 用于在 FastCGI 缓存过期时启动后台子请求更新缓存, 默认 off, 客户端先返回旧缓存, 后台再刷新新缓存
    # 仅在已启用 fastcgi_cache 且允许 `fastcgi_cache_use_stale updating` 时才有意义
    fastcgi_cache_background_update  on;

    # 用于定义 FastCGI 缓存读取绕过条件, 官方无默认值, 任一参数非空且不为 "0" 时, 本次请求不从缓存读取
    # 不使用 map 时可用保守写法: 带 Cookie、Authorization 或客户端 no-cache 请求直接回源, 避免用户态内容命中公共缓存
    fastcgi_cache_bypass  $http_cookie $http_authorization $http_pragma $http_cache_control;

    # 用于定义 FastCGI 响应不写入缓存的条件, 官方无默认值, 通常应与 fastcgi_cache_bypass 保持一致
    # bypass 控制不读缓存, no_cache 控制不写缓存, 两者配合避免用户态、鉴权和刷新请求污染缓存
    fastcgi_no_cache $http_cookie $http_authorization $http_pragma $http_cache_control;

    # 用于定义 FastCGI 缓存键, 官方无默认值, 缓存键决定哪些请求会命中同一份缓存
    # 通用写法应包含协议、请求方法、主机和完整 URI, 避免不同域名、HTTP/HTTPS 或 GET/HEAD/POST 请求缓存串用
    fastcgi_cache_key  "$scheme$request_method$host$request_uri";

    # 用于启用 FastCGI 缓存锁, 默认 off, 同一缓存键首次回源时只允许一个请求去填充缓存
    # 可防止缓存未命中或过期瞬间大量请求同时打到 PHP-FPM, 适合已启用 fastcgi_cache 的动态页面缓存场景
    fastcgi_cache_lock  on;

    # 用于限制 FastCGI 缓存锁的独占回源时间, 默认 5s, 首个填充缓存的请求超过该时间未完成时, 可额外放行一个请求回源
    # 需配合 fastcgi_cache_lock on 使用, 默认值已适合通用 LNMP/PHP 缓存场景, 避免慢请求长期阻塞同一缓存键
    fastcgi_cache_lock_age  5s;

    # 用于设置 FastCGI 缓存锁的等待超时时间, 默认 5s, 等待超时后请求会直接回源, 但该响应不会写入缓存
    # 需配合 fastcgi_cache_lock on 使用, 默认值已适合通用 LNMP/PHP 缓存场景, 避免同一缓存键请求长时间排队
    fastcgi_cache_lock_timeout  5s;

    # 用于指定哪些请求方法的 FastCGI 响应允许写入缓存, 默认 GET HEAD, GET/HEAD 始终会被加入, 但建议显式写出
    # 通用 LNMP/PHP 缓存只应缓存 GET/HEAD, 不建议缓存 POST/PUT 等带副作用或用户态语义的请求
    fastcgi_cache_methods  GET HEAD;

    # 用于设置同一缓存键被请求多少次后才写入 FastCGI 缓存, 默认 1 可避免一次性、低频页面占用缓存空间
    # 通用 LNMP/PHP 缓存建议设为 2, 只有重复访问的响应才缓存, 高命中内容站可保持 1 以尽快生成缓存
    fastcgi_cache_min_uses  2;

    # 用于定义 FastCGI 缓存目录和共享内存区, 官方无默认值, 适用于 LNMP、WordPress、PHP 动态页面等可缓存场景
    # keys_zone=fastcgi:20m 用于保存缓存 key 元数据, 20m 约可存十几万个 key, max_size=1g 限制磁盘缓存总量
    # inactive=30m 表示缓存项 30 分钟未被访问即清理, use_temp_path=off 可避免临时文件跨文件系统复制
    fastcgi_cache_path  /var/cache/openresty/fastcgi_cache levels=1:2 keys_zone=fastcgi:20m max_size=1g inactive=30m use_temp_path=off;

    # 用于在 FastCGI 缓存过期后使用 If-Modified-Since / If-None-Match 向上游重新校验, 默认 off
    # 仅在已启用 fastcgi_cache 且上游响应带 Last-Modified/ETag 时有意义, 命中 304 可刷新缓存元数据并减少响应体回传
    fastcgi_cache_revalidate  on;

    # 用于按响应状态码定义 FastCGI 缓存有效期, 官方无默认值, 未显式指定状态码时仅适用于 200/301/302
    # 上游 X-Accel-Expires Expires Cache-Control 的缓存策略优先级高于本指令, Set-Cookie 与 Vary:* 响应默认不缓存
    # 通用 LNMP/PHP 场景仅缓存可确定安全的成功/重定向响应, 404 短缓存用于降低无效请求回源, 不建议使用 any
    fastcgi_cache_valid  200 302  60m;
    fastcgi_cache_valid  301      1d;
    fastcgi_cache_valid  404      1m;
    fastcgi_cache_valid  500 502 503 504 0s;
    # fastcgi_cache_valid  any      1m;

    # 用于设置连接 FastCGI 上游的超时时间, 默认 60s, 只限制与 PHP-FPM/FastCGI 建立连接的时间, 不是脚本执行或响应读取时间
    # 本地 PHP-FPM 通常应很快连接成功, 通用 LNMP 模板可收紧到 10s~30s, 跨主机 FastCGI 或弱网络环境可保持 60s
    fastcgi_connect_timeout  30s;

    # 用于隐藏 FastCGI 上游响应中的指定头字段, 官方无默认值, nginx 默认已不转发 Status 和 X-Accel-* 头
    # 通用 LNMP/PHP 模板可隐藏 X-Powered-By, 减少 PHP/框架指纹暴露, 不建议隐藏 Set-Cookie、Cache-Control 等业务头
    fastcgi_hide_header  X-Powered-By;

    # 用于拦截 FastCGI 上游返回的 300 及以上状态码, 默认 off, 开启后可交由 nginx error_page 统一处理错误页
    # 适合通用 LNMP/PHP 模板, 避免 PHP-FPM/应用错误页原样暴露给用户, 需配合 error_page 指定要接管的状态码
    fastcgi_intercept_errors  on;

    # 用于要求 FastCGI 上游响应后保持连接, 默认 off, 主要用于配合 upstream keepalive 复用到 PHP-FPM 的连接
    # 单独开启不会自动创建连接池, 但现代 PHP-FPM 通常兼容, 通用 LNMP 模板可开启, 减少具备 keepalive 条件时的重复建连开销
    fastcgi_keep_conn  on;

    # 用于设置读取 FastCGI 上游响应的相邻读操作超时时间, 默认 60s, 仅限制两次 read 之间的空闲时间, 不限制完整响应耗时
    # 该值影响 PHP 脚本长时间无输出场景, 通用 LNMP/PHP 模板建议保持默认, 长耗时接口可单独放宽
    fastcgi_read_timeout  60s;

    # 用于设置向 FastCGI 上游发送请求的相邻写操作超时时间, 默认 60s, 仅限制两次 write 之间的空闲时间
    # 该值影响大请求体传递和上游接收能力, 通用 LNMP/PHP 模板建议保持默认, 上传场景可按需放宽
    fastcgi_send_timeout  60s;

    ## https://nginx.org/en/docs/http/ngx_http_proxy_module.html
    # 用于设置读取代理上游响应首部的缓冲区大小, 默认等于系统内存页大小, 通常为 4k 或 8k, 可用 `getconf PAGE_SIZE` 查看
    # 该缓冲区主要承载响应头, 过小会导致 `large header` 被判定为无效响应, 通用反代模板建议保持默认, 遇到上游响应头过大再按需调大
    proxy_buffer_size  16k;

    # 用于控制是否缓存代理上游响应, 默认 on, 开启后 nginx 会尽快读取上游响应并写入内存缓冲区
    # 响应超过内存缓冲区时可能落盘到临时文件, 通用反代模板建议保持开启, 可降低慢客户端对上游连接的占用
    proxy_buffering  on;

    # 用于设置读取代理上游响应正文的缓冲区数量和大小, 默认 8 4k 或 8 8k, 取决于平台内存页大小
    # 配合较大的响应头缓冲使用, 可减少大响应频繁落盘, 但会提高单连接潜在内存占用
    proxy_buffers  8 16k;

    # 用于限制正在发送给客户端的 busy buffer 总大小, 默认 8k 或 16k, 通常等于 proxy_buffer_size/proxy_buffers 中两个缓冲区大小
    # 仅在 proxy_buffering on 时生效, 该值过小可能影响大响应缓冲调度
    proxy_busy_buffers_size  32k;

    # 用于指定代理缓存使用的共享内存区, 默认 off, 需要先通过 proxy_cache_path 定义对应 `cache zone`
    # 通用反代模板不建议全局开启, 适合静态资源, 下载文件 API 可缓存响应等场景, 动态接口需按业务规则单独启用
    # proxy_cache  proxy_cache;

    # 用于允许过期缓存后台更新, 默认 off 客户端先返回 stale 缓存, 同时由后台子请求刷新缓存
    # 需要配合 `proxy_cache_use_stale updating` 使用才有意义, 适合静态资源或可接受短暂旧内容的缓存场景
    proxy_cache_background_update  on;

    # 用于设置不从代理缓存取响应的条件, 默认无配置, 任一条件非空且不为 0 时直接回源
    # 只影响是否读取缓存, 不等于禁止写入缓存, 常与 proxy_no_cache 配合用于登录态, Authorization, no-cache 请求
    proxy_cache_bypass  $arg_nocache $http_authorization $http_pragma;

    # 用于设置不写入代理缓存的条件, 默认无配置, 任一条件非空且不为 0 时不保存响应
    # 建议与 proxy_cache_bypass 条件保持一致, 避免手动绕过缓存, 登录态或 no-cache 请求的响应被写入共享缓存
    proxy_no_cache  $arg_nocache $http_authorization $http_pragma;

    # 用于定义代理缓存键, 默认接近 $scheme$proxy_host$uri$is_args$args, 文档 Default 表示为 $scheme$proxy_host$request_uri
    # 这里改用 $host 按访问域名隔离缓存, 并保留规范化 URI 与查询参数, 更适合通用多域名反代缓存
    proxy_cache_key  "$scheme$host$uri$is_args$args";

    # 用于启用代理缓存锁, 默认 off, 同一 `cache key` 首次回源填充缓存时只允许一个请求访问上游
    # 可减少缓存未命中瞬间的并发回源压力, 适合静态资源和热点缓存场景, 通用代理缓存模板建议开启
    proxy_cache_lock  on;

    # 用于设置缓存锁允许追加回源请求的时间阈值, 默认 5s, 仅在 `proxy_cache_lock on;` 时有意义
    # 若首个填充缓存的回源请求超过该时间仍未完成, nginx 可再放行一个相同 `cache key` 请求回源, 避免单个慢请求长期阻塞
    proxy_cache_lock_age  5s;

    # 用于设置等待缓存锁释放的最长时间, 默认 5s, 仅在 `proxy_cache_lock on;` 时有意义
    # 超时后请求会直接回源, 但该响应不会写入缓存, 通用缓存模板建议保持默认或按上游响应时间微调
    proxy_cache_lock_timeout  5s;

    # 用于指定允许写入代理缓存的请求方法, 默认 GET HEAD, 且 GET/HEAD 总会被加入缓存方法列表
    # 通用代理缓存模板建议显式写出 GET HEAD, 不建议默认缓存 POST, 除非接口幂等且缓存键已包含必要区分条件
    proxy_cache_methods  GET HEAD;

    # 用于设置同一 cache key 至少请求多少次后才写入代理缓存, 默认 1, 首次可缓存响应即写入缓存
    # 通用代理缓存模板建议保持默认, 若大量一次性 URL 导致缓存污染, 可按需调大到 2 或 3
    proxy_cache_min_uses  1;

    # 用于定义代理缓存路径和共享内存区, 默认无配置, 只能写在 http 块
    # keys_zone 保存缓存键和元数据, 1m 约存 8000 个 key, inactive 表示多久未访问后清理, 不是缓存有效期
    proxy_cache_path  /var/cache/openresty/proxy_cache levels=1:2 keys_zone=proxy:20m max_size=1g inactive=1h use_temp_path=off;

    # 用于启用过期缓存的条件 revalidate, 默认 off, 1.5.7+ 支持
    # 上游响应带 Last-Modified 或 ETag 时可用 If-Modified-Since/If-None-Match 验证, 适合静态资源和可缓存内容
    proxy_cache_revalidate  on;

    # 用于允许在上游异常或缓存更新时返回过期代理缓存, 默认 off
    # updating 可配合 proxy_cache_background_update 使用, error/timeout/5xx 可提升上游故障时的可用性, 通用缓存模板不建议包含 403/404/429
    # proxy_cache_use_stale  error timeout updating http_500 http_502 http_503 http_504;

    # 用于按响应状态码定义代理缓存有效期, 官方无默认值, 未显式指定状态码时仅适用于 200/301/302
    # 上游 X-Accel-Expires Expires Cache-Control 的缓存策略优先级高于本指令, Set-Cookie 与 Vary:* 响应默认不缓存
    # 通用反代缓存场景仅缓存成功/重定向响应, 404 短缓存用于降低无效请求回源, 不建议使用 any 或缓存 5xx
    proxy_cache_valid  200 302  120m;
    proxy_cache_valid  301      1d;
    proxy_cache_valid  404      10m;
    proxy_cache_valid  500 502 503 504 0s;
    # proxy_cache_valid  any      1m;

    # 用于设置与代理上游建立 TCP 连接的超时时间, 默认 60s, 通常不应超过 75s
    # 只限制连接建立阶段, 不包含发送请求和读取响应, 通用反代模板建议保持默认或按内网/公网链路适当缩短
    proxy_connect_timeout  30s;

    # 用于设置 proxy_hide_header 和 proxy_set_header 使用的哈希表 bucket 大小, 默认 64
    # 通用反代模板建议保持默认, 只有自定义代理请求头较多或启动提示 hash bucket 空间不足时再调大
    proxy_headers_hash_bucket_size  64;

    # 用于设置 proxy_hide_header 和 proxy_set_header 使用的哈希表最大大小, 默认 512
    # 通用反代模板建议保持默认, 只有代理请求头配置很多或启动提示 hash max size 不足时再调大
    proxy_headers_hash_max_size  512;

    # 用于隐藏代理上游暴露的后端技术栈响应头, 默认无额外隐藏字段
    # 仅影响返回给客户端的响应头, 不等于关闭 nginx 自身 Server 头, 通用反代模板可按需启用
    proxy_hide_header  X-Powered-By;

    # 用于拦截代理上游返回的 300 及以上响应并交由 error_page 处理, 默认 off
    # 适合统一 404/50x 错误页或隐藏上游错误内容, 开启后需确认不会影响正常 301/302 跳转
    proxy_intercept_errors  on;

    # 用于限制从代理上游读取响应的速度, 默认 0, 表示不限速, 1.7.7+ 支持
    # 限制按单个请求计算且仅在 proxy_buffering on 时生效, 通用反代模板建议保持默认, 避免无意拖慢回源读取
    proxy_limit_rate  0;

    # 用于设置读取代理上游响应的相邻读操作超时时间, 默认 60s, 仅限制两次 read 之间的空闲时间
    # 不限制完整响应传输耗时, 通用反代模板建议保持默认, 长耗时接口或流式响应可在单独 location 放宽
    proxy_read_timeout  30s;

    # 用于设置向代理上游发送请求的相邻写操作超时时间, 默认 60s, 仅限制两次 write 之间的空闲时间
    # 不限制完整请求传输耗时, 通用反代模板建议保持默认, 大请求体上传或弱上游接收慢时可单独放宽
    proxy_send_timeout  30s;

    # 用于为代理上游连接启用 TCP SO_KEEPALIVE, 默认 off, 1.15.6+ 支持
    # 适合长连接或跨 NAT/防火墙链路, 但探测周期仍取决于系统 tcp_keepalive_* 参数, 普通短连接反代不必开启
    proxy_socket_keepalive  on;

    include /etc/nginx/conf.d/*.conf;
}

include /etc/nginx/conf.d/*.main;
