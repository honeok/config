<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>极简密码生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .history-item:first-child {
        background-color: #f0fdf4;
        border-left: 4px solid #22c55e;
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen py-8 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
      <div class="p-6 bg-slate-800 text-center">
        <h1 class="text-white text-sm opacity-70 mb-2 uppercase tracking-widest">生成的密码</h1>
        <div class="flex items-center justify-between bg-slate-700 rounded-lg p-4 mb-4">
          <input
            type="text"
            id="result"
            readonly
            class="bg-transparent text-green-400 text-2xl font-mono w-full outline-none"
            placeholder="点击生成"
          />
          <button onclick="copyPassword()" class="ml-2 p-2 hover:bg-slate-600 rounded transition" title="复制">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6 text-white"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="Wait, let me rewrite this icon... 8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"
              />
            </svg>
          </button>
        </div>
        <button
          onclick="generatePassword()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition shadow-lg"
        >
          重新生成
        </button>
      </div>

      <div class="p-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >密码长度: <span id="lenValue" class="text-blue-600 font-bold">16</span></label
              >
              <input
                type="range"
                id="length"
                min="4"
                max="128"
                value="16"
                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
              />
            </div>
            <div class="flex items-center justify-between p-2 hover:bg-gray-50 rounded">
              <label for="minNumbers" class="text-sm text-gray-600">最少数字个数</label>
              <input
                type="number"
                id="minNumbers"
                min="0"
                max="10"
                value="1"
                class="w-16 border rounded px-2 py-1 text-sm"
              />
            </div>
            <div class="flex items-center justify-between p-2 hover:bg-gray-50 rounded">
              <label for="minSymbols" class="text-sm text-gray-600">最少符号个数</label>
              <input
                type="number"
                id="minSymbols"
                min="0"
                max="10"
                value="1"
                class="w-16 border rounded px-2 py-1 text-sm"
              />
            </div>
          </div>

          <div class="space-y-2">
            <label class="flex items-center space-x-3 p-2 hover:bg-gray-50 rounded cursor-pointer">
              <input type="checkbox" id="uppercase" checked class="w-4 h-4 text-blue-600" />
              <span class="text-sm text-gray-700">大写字母 (A-Z)</span>
            </label>
            <label class="flex items-center space-x-3 p-2 hover:bg-gray-50 rounded cursor-pointer">
              <input type="checkbox" id="lowercase" checked class="w-4 h-4 text-blue-600" />
              <span class="text-sm text-gray-700">小写字母 (a-z)</span>
            </label>
            <label class="flex items-center space-x-3 p-2 hover:bg-gray-50 rounded cursor-pointer">
              <input type="checkbox" id="numbers" checked class="w-4 h-4 text-blue-600" />
              <span class="text-sm text-gray-700">数字 (0-9)</span>
            </label>
            <label class="flex items-center space-x-3 p-2 hover:bg-gray-50 rounded cursor-pointer">
              <input type="checkbox" id="symbols" checked class="w-4 h-4 text-blue-600" />
              <span class="text-sm text-gray-700">特殊符号 (!@#$%^&*)</span>
            </label>
            <label class="flex items-center space-x-3 p-2 hover:bg-gray-50 rounded cursor-pointer border-t pt-3 mt-2">
              <input type="checkbox" id="excludeSimilar" checked class="w-4 h-4 text-orange-500" />
              <span class="text-sm text-gray-700">排除易混淆字符 (i, l, 1, L, o, 0, O)</span>
            </label>
          </div>
        </div>
      </div>

      <div class="border-t border-gray-100 bg-gray-50 p-6">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">历史记录 (最近20条)</h3>
          <button onclick="clearHistory()" class="text-xs text-red-500 hover:underline">清空</button>
        </div>
        <div id="historyList" class="space-y-2 max-h-60 overflow-y-auto pr-2">
          <p class="text-center text-gray-400 text-sm py-4">暂无记录</p>
        </div>
      </div>
    </div>

    <script>
      const charSets = {
        upper: "ABCDEFGHJKLMNPQRSTUVWXYZ", // 默认排除易混淆
        upperAll: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
        lower: "abcdefghijkmnopqrstuvwxyz",
        lowerAll: "abcdefghijklmnopqrstuvwxyz",
        number: "23456789",
        numberAll: "0123456789",
        symbol: "!@#$%^&*",
      };

      const history = [];

      // 同步长度数值显示
      document.getElementById("length").addEventListener("input", (e) => {
        document.getElementById("lenValue").innerText = e.target.value;
      });

      function generatePassword() {
        const length = parseInt(document.getElementById("length").value);
        const useUpper = document.getElementById("uppercase").checked;
        const useLower = document.getElementById("lowercase").checked;
        const useNumber = document.getElementById("numbers").checked;
        const useSymbol = document.getElementById("symbols").checked;
        const excludeSimilar = document.getElementById("excludeSimilar").checked;
        const minNum = parseInt(document.getElementById("minNumbers").value) || 0;
        const minSym = parseInt(document.getElementById("minSymbols").value) || 0;

        let charset = "";
        let mandatory = [];

        if (useUpper) {
          const s = excludeSimilar ? charSets.upper : charSets.upperAll;
          charset += s;
          mandatory.push(s[Math.floor(Math.random() * s.length)]);
        }
        if (useLower) {
          const s = excludeSimilar ? charSets.lower : charSets.lowerAll;
          charset += s;
          mandatory.push(s[Math.floor(Math.random() * s.length)]);
        }
        if (useNumber) {
          const s = excludeSimilar ? charSets.number : charSets.numberAll;
          charset += s;
          for (let i = 0; i < minNum; i++) mandatory.push(s[Math.floor(Math.random() * s.length)]);
        }
        if (useSymbol) {
          const s = charSets.symbol;
          charset += s;
          for (let i = 0; i < minSym; i++) mandatory.push(s[Math.floor(Math.random() * s.length)]);
        }

        if (charset === "") return alert("请至少选择一种字符类型！");
        if (mandatory.length > length) return alert("最小个数要求超过了密码总长度！");

        let password = [...mandatory];
        for (let i = mandatory.length; i < length; i++) {
          password.push(charset[Math.floor(Math.random() * charset.length)]);
        }

        // 洗牌算法乱序
        password = password.sort(() => Math.random() - 0.5).join("");

        document.getElementById("result").value = password;
        addHistory(password);
      }

      function addHistory(pw) {
        history.unshift({ pw, time: new Date().toLocaleTimeString() });
        if (history.length > 20) history.pop();
        renderHistory();
      }

      function renderHistory() {
        const list = document.getElementById("historyList");
        list.innerHTML = history
          .map(
            (item) => `
                <div class="history-item flex justify-between items-center bg-white p-3 rounded border border-gray-200 text-sm font-mono shadow-sm">
                    <span class="truncate mr-4 text-gray-700 font-bold">${item.pw}</span>
                    <span class="text-gray-400 text-xs flex-shrink-0">${item.time}</span>
                </div>
            `
          )
          .join("");
      }

      function clearHistory() {
        history.length = 0;
        renderHistory();
      }

      function copyPassword() {
        const copyText = document.getElementById("result");
        if (!copyText.value) return;
        copyText.select();
        navigator.clipboard.writeText(copyText.value);
        alert("已复制到剪贴板");
      }

      // 初始化生成一个
      generatePassword();
    </script>
  </body>
</html>
